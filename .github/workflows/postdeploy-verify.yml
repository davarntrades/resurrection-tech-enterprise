name: Post-deploy verification

# One-shot, manual production verification of the reliability + audit features.
# Dispatch-only (no schedule/push) so it adds zero ongoing noise — the nightly
# verify-activation workflow handles continuous health.

on:
  workflow_dispatch: {}

jobs:
  postdeploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: "Production /health — attestation + engine commit visible"
        id: health
        run: |
          curl -fsSL --max-time 25 \
            https://resurrection-tech-enterprise-production.up.railway.app/health > health.json
          python3 -m json.tool health.json
          python3 - <<'PY'
          import json, os
          h = json.load(open("health.json"))
          att = h.get("attestation") or {}
          ec = att.get("engine_commit") or h.get("engine_commit") or ""
          rh = att.get("ruleset_hash") or ""
          assert att, "no attestation block in /health"
          assert ec and ec != "unknown", f"engine_commit not visible: {ec!r}"
          assert rh, "no ruleset_hash in attestation"
          assert len(h.get("live_sectors", [])) == 8, f"live_sectors={h.get('live_sectors')}"
          open(os.environ["GITHUB_OUTPUT"], "a").write(f"engine_commit={ec}\nruleset_hash={rh}\n")
          print(f"attestation OK · engine_commit={ec[:12]} · ruleset_hash={rh[:12]} · sectors=8")
          PY

      - name: "Public /v1/assess — Day-1 self-serve front door is live"
        run: |
          curl -fsSL --max-time 30 -X POST \
            https://resurrection-tech-enterprise-production.up.railway.app/v1/assess \
            -H 'content-type: application/json' \
            -d '{"manifest":{"tools":[
                  {"name":"get_balance","description":"Read an account balance"},
                  {"name":"transfer_funds","description":"Move funds to an account and settle the payment"},
                  {"name":"sign_and_broadcast_transaction","description":"Sign an on-chain transaction and broadcast it to the blockchain"}
                ]},"org":"CI Smoke"}' > assess.json
          python3 - <<'PY'
          import json
          r = json.load(open("assess.json"))
          s = r["summary"]
          assert s["tools"] == 3, f"tools={s['tools']}"
          assert s["covered"] >= 1, f"covered={s['covered']}"
          assert s["uncovered"] >= 1, f"uncovered={s['uncovered']} (on-chain gap should surface)"
          assert s["verified_blocked_trajectories"] >= 1, "no grounded BLOCK trajectories"
          assert r.get("commercial"), "missing commercial line"
          assert (r.get("attestation") or {}).get("engine_commit"), "no attestation"
          lat = r.get("latency") or {}
          assert lat.get("p50") is not None and lat.get("p95") is not None, "no measured latency"
          assert lat["p95"] >= lat["p50"] and lat["max"] < 1000, f"implausible latency {lat}"
          print(f"/v1/assess live ✓ · cov {s['coverage_pct']}% · "
                f"{s['uncovered']} gap(s) · {s['verified_blocked_trajectories']} verified BLOCK · "
                f"p50 {lat['p50']} ms")
          PY

      - name: "Live /v1/evaluate (via website proxy) — PERMIT / ESCALATE / BLOCK"
        run: |
          # /v1/evaluate is token-protected in prod; the public path is the
          # website proxy, which injects the Bearer token server-side and calls
          # the real engine. This exercises the live evaluate path for all three
          # verdicts (ESCALATE surfaces as the UI's human-review state).
          PROXY=https://resurrection-tech.com/api/evaluate-trajectory
          ev() { curl -fsSL -L --post301 --post302 --post303 --max-time 30 -X POST "$PROXY" \
                   -H 'content-type: application/json' -d "$1"; }
          ev '{"trajectory":[{"tool":"transfer_funds","args":{"amount":50000,"to":"acct_991"}}]}' > pe_block.json
          ev '{"trajectory":[{"tool":"get_account_balance","args":{"account":"acct_1"}}]}' > pe_permit.json
          ev '{"trajectory":[{"tool":"read_patient_record","args":{}},{"tool":"generate_risk_report","args":{}},{"tool":"send_report_to_clinician","args":{}}]}' > pe_escalate.json
          python3 - <<'PY'
          import json
          b = json.load(open("pe_block.json"))
          assert b.get("ok") is True and b.get("source") == "morrison", f"block: ok={b.get('ok')} source={b.get('source')}"
          assert b["verdict"] == "BLOCK", f"block verdict={b['verdict']}"

          p = json.load(open("pe_permit.json"))
          assert p.get("source") == "morrison", f"permit source={p.get('source')}"
          assert p["verdict"] == "PERMIT", f"permit verdict={p['verdict']}"

          e = json.load(open("pe_escalate.json"))
          assert e.get("source") == "morrison", f"escalate source={e.get('source')}"
          assert e["verdict"] == "INCONCLUSIVE", f"escalate verdict={e['verdict']} (ESCALATE → human-review state)"
          hr = e.get("humanReview") or {}
          assert hr.get("requiredAction") and hr.get("reason"), f"missing human-review card: {hr}"
          assert "human review" in (e.get("runtimeStatus") or "").lower(), e.get("runtimeStatus")

          print(f"/v1/evaluate live (proxy) ✓ · BLOCK + PERMIT + ESCALATE → "
                f"{hr['requiredAction']} · source=morrison")
          PY

      - name: "Direct /v1/evaluate raw contract (optional — needs GOVERNANCE_TOKEN secret)"
        env:
          GOVERNANCE_TOKEN: ${{ secrets.GOVERNANCE_TOKEN }}
        run: |
          BASE=https://resurrection-tech-enterprise-production.up.railway.app
          if [ -z "${GOVERNANCE_TOKEN}" ]; then
            echo "::notice::No GOVERNANCE_TOKEN secret set — /v1/evaluate is token-protected in prod."
            echo "Skipping the direct raw-contract check (the live evaluate path is already covered via the website proxy above)."
            exit 0
          fi
          AUTH="authorization: Bearer ${GOVERNANCE_TOKEN}"
          curl -fsSL --max-time 30 -X POST "$BASE/v1/evaluate" \
            -H 'content-type: application/json' -H "$AUTH" \
            -d '{"trajectory":[{"tool":"transfer_funds","args":{"amount":50000,"to":"acct_991"}}],"domains":["finance"]}' > ev_block.json
          curl -fsSL --max-time 30 -X POST "$BASE/v1/evaluate" \
            -H 'content-type: application/json' -H "$AUTH" \
            -d '{"trajectory":[{"tool":"read_patient_record","args":{}},{"tool":"generate_risk_report","args":{}},{"tool":"send_report_to_clinician","args":{}}]}' > ev_escalate.json
          python3 - <<'PY'
          import json
          b = json.load(open("ev_block.json"))
          assert b["verdict"] == "BLOCK" and b["permitted"] is False and b["blocked"] is True, b
          assert b.get("omega_domain") == "finance" and b.get("trajectory_hash"), b
          assert (b.get("attestation") or {}).get("engine_commit"), "no attestation on verdict"
          e = json.load(open("ev_escalate.json"))
          assert e["verdict"] == "ESCALATE" and e.get("permitted") is False and e.get("requires_human_review") is True, e
          rv = e.get("review") or {}
          for k in ("reason", "required_action", "decision_authority", "next_step", "execution_status"):
              assert rv.get(k), f"review card missing {k}: {rv}"
          assert rv["execution_status"] == "HELD FOR HUMAN REVIEW", rv["execution_status"]
          print(f"direct /v1/evaluate raw contract ✓ · BLOCK + ESCALATE → {rv['decision_authority']}")
          PY

      - name: "Website /assess proxy returns a live report"
        run: |
          curl -fsSL -L --post301 --post302 --post303 --max-time 30 -X POST \
            https://resurrection-tech.com/api/assess \
            -H 'content-type: application/json' \
            -d '{"manifest":{"tools":[{"name":"transfer_funds","description":"Move funds to an account"}]}}' > wassess.json
          python3 - <<'PY'
          import json
          r = json.load(open("wassess.json"))
          assert r.get("ok") is True, f"ok={r.get('ok')} err={r.get('error')}"
          assert r["summary"]["tools"] == 1
          print("website /api/assess proxy live ✓ (source: morrison engine)")
          PY

      - name: "Website API returns source morrison (badge data live)"
        run: |
          curl -fsSL -L --post301 --post302 --post303 --max-time 25 -X POST \
            https://resurrection-tech.com/api/evaluate-trajectory \
            -H 'content-type: application/json' \
            -d '{"trajectory":[{"tool":"transfer","args":{"amount":50000,"threshold":1000}}]}' > resp.json
          python3 - <<'PY'
          import json
          r = json.load(open("resp.json"))
          assert r.get("source") == "morrison", f"source={r.get('source')!r} (expected morrison)"
          print("website API source=morrison ✓ (real engine, badge data present)")
          PY

      - name: "Live-demo bundle carries badge + chained-export code"
        run: |
          curl -fsSL --max-time 25 https://resurrection-tech.com/live-demo > page.html
          : > all.js
          for u in $(grep -oE '/_next/static/chunks/[^"]+\.js' page.html | sort -u); do
            curl -fsSL --max-time 25 "https://resurrection-tech.com$u" >> all.js || true
          done
          echo "scanned js bytes: $(wc -c < all.js)"
          grep -q "Morrison Runtime Governance engine" all.js && echo "source badge (engine) ✓"   || { echo "::error::badge engine text missing"; exit 1; }
          grep -q "Heuristic fallback" all.js              && echo "source badge (fallback) ✓"   || { echo "::error::badge fallback text missing"; exit 1; }
          grep -q "morrison-audit-chain" all.js            && echo "chained export schema ✓"     || { echo "::error::chained-export code missing"; exit 1; }

      - name: "Replayability — production attestation reproducible from source"
        run: |
          EC='${{ steps.health.outputs.engine_commit }}'
          RH='${{ steps.health.outputs.ruleset_hash }}'
          git clone --filter=blob:none --no-checkout \
            https://github.com/davarntrades/Morrison-Runtime-Governance.git /tmp/engine
          git -C /tmp/engine checkout "$EC"
          cd governance-service
          PYTHONPATH=/tmp/engine python test_replay.py
          EXPECT="$RH" PYTHONPATH=/tmp/engine python3 - <<'PY'
          import os
          from replay import _ruleset_hash, _layer
          prod = os.environ["EXPECT"]
          core = ["finance","banking","fintech","cybersecurity","healthcare",
                  "data_privacy","enterprise","compliance","fraud"]
          got = _ruleset_hash(_layer(core, 3).rules)
          print("production ruleset_hash:", prod)
          print("rebuilt    ruleset_hash:", got)
          assert got == prod, "MISMATCH — production attestation not reproducible from source"
          print("production attestation is reproducible (replayable) from source ✓")
          PY
