name: Verify sector activation

# Runs the two pre-activation checks from a GitHub runner (open egress):
#   1. The Railway governance endpoint must REQUIRE auth (401 without a token).
#   2. The live website must reach the real engine (x-governance-source: morrison).
# Neither check uses a secret: (1) is unauthenticated by design; (2) hits the
# site's public API route, which holds the token server-side.

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - ".github/workflows/verify-activation.yml"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Railway /v1/evaluate without token (expect 401)
        id: rail
        run: |
          CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 20 -X POST \
            https://resurrection-tech-enterprise-production.up.railway.app/v1/evaluate \
            -H 'content-type: application/json' \
            -d '{"trajectory":[{"tool":"x","args":{}}]}' || echo "000")
          echo "code=$CODE" | tee -a "$GITHUB_OUTPUT"

      - name: Railway /health (engine sector registry)
        id: health
        run: |
          BODY=$(curl -s --max-time 20 \
            https://resurrection-tech-enterprise-production.up.railway.app/health || echo "{}")
          echo "$BODY"
          N=$(printf '%s' "$BODY" | python3 -c "import sys,json;print(len((json.load(sys.stdin) or {}).get('live_sectors',[])))" 2>/dev/null || echo "0")
          echo "live_sectors=$N" | tee -a "$GITHUB_OUTPUT"

      - name: "Website real-engine check (expect x-governance-source = morrison)"
        id: site
        run: |
          # Follow redirects and KEEP the POST across them (--post30x), so the
          # request actually reaches /api/evaluate-trajectory even if the apex
          # redirects to a canonical host. tail -1 picks the final response's
          # header if the redirect chain echoes more than one.
          SRC=$(curl -s -L --post301 --post302 --post303 -D - -o /dev/null --max-time 25 -X POST \
            https://resurrection-tech.com/api/evaluate-trajectory \
            -H 'content-type: application/json' \
            -d '{"trajectory":[{"tool":"transfer","args":{"amount":50000,"threshold":1000}}]}' \
            | tr -d '\r' | awk -F': ' 'tolower($1)=="x-governance-source"{print $2}' | tail -1)
          echo "source=${SRC:-none}" | tee -a "$GITHUB_OUTPUT"

      - name: Verdict
        run: |
          RAIL='${{ steps.rail.outputs.code }}'
          SRC='${{ steps.site.outputs.source }}'
          SECTORS='${{ steps.health.outputs.live_sectors }}'
          {
            echo "## Sector activation verification"
            echo ""
            echo "| Check | Result | Expected | Pass |"
            echo "|---|---|---|---|"
            echo "| Railway requires auth | \`$RAIL\` | 401 | $([ "$RAIL" = 401 ] && echo ✅ || echo ❌) |"
            echo "| Website real engine | \`$SRC\` | morrison | $([ "$SRC" = morrison ] && echo ✅ || echo ❌) |"
            echo "| Engine live sectors | \`$SECTORS\` | 8 | $([ "$SECTORS" = 8 ] && echo ✅ || echo ❌) |"
          } | tee -a "$GITHUB_STEP_SUMMARY"
          echo "RESULT rail=$RAIL source=$SRC sectors=$SECTORS"

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch production /live-demo + its CSS bundle
        id: fe
        run: |
          set -e
          curl -fsSL --max-time 30 https://resurrection-tech.com/live-demo > page.html
          CSS_URLS=$(grep -oE '/_next/static/css/[^"]+\.css' page.html | sort -u)
          : > all.css
          for u in $CSS_URLS; do
            curl -fsSL --max-time 30 "https://resurrection-tech.com$u" >> all.css || true
          done
          echo "css_bytes=$(wc -c < all.css)" | tee -a "$GITHUB_OUTPUT"
          gapfix=no;    grep -q ':has(.trust-bar)' all.css && gapfix=yes
          opaque=no;    grep -q '.nav.scrolled{background:var(--bg-1)' all.css && opaque=yes
          oldtrans=no;  grep -Eq '8,9,11,(0?\.(95|66))' all.css && oldtrans=yes
          trustbar=present; grep -q 'class="trust-bar"' page.html || trustbar=absent
          pending=present;  grep -qi 'rules pending' page.html || pending=absent
          defence=no;   grep -q 'Defence / Sovereign' page.html && defence=yes
          { echo "gapfix=$gapfix"; echo "opaque=$opaque"; echo "oldtrans=$oldtrans";
            echo "trustbar=$trustbar"; echo "pending=$pending"; echo "defence=$defence"; } | tee -a "$GITHUB_OUTPUT"
      - name: Frontend verdict
        run: |
          G='${{ steps.fe.outputs.gapfix }}'; O='${{ steps.fe.outputs.opaque }}'
          T='${{ steps.fe.outputs.oldtrans }}'; B='${{ steps.fe.outputs.trustbar }}'
          P='${{ steps.fe.outputs.pending }}'; D='${{ steps.fe.outputs.defence }}'
          {
            echo "## Production /live-demo frontend verification"
            echo ""
            echo "| Check | Result | Expected | Pass |"
            echo "|---|---|---|---|"
            echo "| c5a11d3 CSS live (gap fix :has(.trust-bar)) | \`$G\` | yes | $([ "$G" = yes ] && echo ✅ || echo ❌) |"
            echo "| Opaque scrolled nav shipped | \`$O\` | yes | $([ "$O" = yes ] && echo ✅ || echo ❌) |"
            echo "| Old translucent nav values gone | \`$T\` | no | $([ "$T" = no ] && echo ✅ || echo ❌) |"
            echo "| No trust-bar on /live-demo (=> nav top:0, no gap) | \`$B\` | absent | $([ "$B" = absent ] && echo ✅ || echo ❌) |"
            echo "| No 'Ω rules pending' group | \`$P\` | absent | $([ "$P" = absent ] && echo ✅ || echo ❌) |"
            echo "| Defence sector present/selectable | \`$D\` | yes | $([ "$D" = yes ] && echo ✅ || echo ❌) |"
          } | tee -a "$GITHUB_STEP_SUMMARY"
          echo "FRONTEND gapfix=$G opaque=$O oldtrans=$T trustbar=$B pending=$P defence=$D"
