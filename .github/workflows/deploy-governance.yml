name: Governance corpus gate

# Pre-merge regression gate for governance-service/.
#
# NOTE: this workflow no longer deploys. The governance-service is deployed by
# Railway's native GitHub integration (Root Directory = governance-service/,
# branch = main, auto-deploy on push). The previous deploy-railway/update-vercel
# jobs required RAILWAY_TOKEN/VERCEL_* secrets that aren't set, so they failed on
# every push and added noise — they've been removed. This keeps only the value:
# the labelled adversarial corpus + hardening suites must pass before changes
# land. Live production health is covered separately by verify-activation.yml.

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "governance-service/**"
      - ".github/workflows/deploy-governance.yml"
  pull_request:
    paths:
      - "governance-service/**"

concurrency:
  group: governance-corpus-gate-${{ github.ref }}
  cancel-in-progress: true

env:
  ENGINE_REF: main

jobs:
  corpus-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Vendor the engine
        run: |
          git clone --filter=blob:none --no-checkout \
            https://github.com/davarntrades/Morrison-Runtime-Governance.git /tmp/engine
          git -C /tmp/engine checkout "${ENGINE_REF:-main}"
      - name: Labelled corpus (precision/recall must be 1.0; any mismatch fails)
        working-directory: governance-service
        run: PYTHONPATH=/tmp/engine python test_corpus.py
      - name: Finance hardening (verdict + V5+ attribution)
        working-directory: governance-service
        run: PYTHONPATH=/tmp/engine python test_finance_hardening.py
      - name: Cross-domain V5+ hardening
        working-directory: governance-service
        run: PYTHONPATH=/tmp/engine python test_domain_hardening.py
      - name: Target-sector hardening (skips sectors the engine lacks)
        working-directory: governance-service
        run: PYTHONPATH=/tmp/engine python test_sector_hardening.py
      - name: Cybersecurity hardening (attack kill-chain coverage)
        working-directory: governance-service
        run: PYTHONPATH=/tmp/engine python test_cyber_hardening.py
      - name: Healthcare hardening (clinical-agent risk surface)
        working-directory: governance-service
        run: PYTHONPATH=/tmp/engine python test_healthcare_hardening.py
      - name: Healthcare ESCALATE / human-review verdict policy
        working-directory: governance-service
        run: PYTHONPATH=/tmp/engine python test_healthcare_escalation.py
      - name: Replay determinism + tamper-detection
        working-directory: governance-service
        run: PYTHONPATH=/tmp/engine python test_replay.py
      - name: Assessment parity + fail-closed/grounding contracts (/v1/assess)
        working-directory: governance-service
        run: PYTHONPATH=/tmp/engine python test_assess.py
