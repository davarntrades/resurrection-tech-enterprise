name: Verify lead pipeline (end-to-end)

# Dispatch-only. Submits a clearly-marked REAL test lead to the production
# /api/lead endpoint and reports which sinks accepted it (forward / Supabase /
# Resend). Use to prove the assessment → lead funnel actually delivers.

on:
  workflow_dispatch:
    inputs:
      email:
        description: "Lead email to use (reply-to / your inbox marker)"
        required: false
        default: "davarnmorrison1@gmail.com"

jobs:
  verify-lead:
    runs-on: ubuntu-latest
    steps:
      - name: "Submit a real test lead to production /api/lead"
        run: |
          STAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          EMAIL="${{ github.event.inputs.email }}"
          cat > body.json <<JSON
          {
            "name": "CRO Pipeline Verification",
            "email": "${EMAIL}",
            "organisation": "Lead Pipeline Test",
            "role": "Founder",
            "use_case": "Enterprise pilot",
            "source": "verify:lead-pipeline",
            "message": "Automated end-to-end verification of the lead pipeline at ${STAMP}. This is a real submission through the production endpoint to confirm delivery. Safe to delete."
          }
          JSON
          echo "Submitting test lead (email=${EMAIL}) …"
          curl -fsSL -L --post301 --post302 --post303 --max-time 30 -X POST \
            https://resurrection-tech.com/api/lead \
            -H 'content-type: application/json' \
            --data @body.json > resp.json
          echo "── Response ──"; python3 -m json.tool resp.json
          python3 - <<'PY'
          import json
          r = json.load(open("resp.json"))
          assert r.get("ok") is True, f"lead endpoint did not accept the submission: {r}"
          assert r.get("reference"), "no reference returned"
          d = r.get("delivery") or {}
          dest = [k for k in ("forwarded", "stored", "emailed") if d.get(k)]
          print(f"\nLEAD REFERENCE : {r['reference']}")
          print(f"DELIVERED TO   : {', '.join(dest) if dest else 'NONE (logged only)'}")
          if d.get("logged_only"):
              print("\n::warning::Lead was LOGGED ONLY — no LEAD_FORWARD_URL, Supabase, or Resend sink "
                    "is configured in Vercel. The lead is in server logs but was not delivered or stored. "
                    "Configure at least one sink (set RESEND_API_KEY + LEAD_NOTIFY_TO, or Supabase keys, "
                    "or LEAD_FORWARD_URL).")
          else:
              print("\n✅ Lead pipeline delivered the test lead. Check the destination(s) above:")
              if d.get("emailed"): print("   • Email notification → LEAD_NOTIFY_TO (default hello@resurrection-tech.com)")
              if d.get("stored"):  print("   • Row in Supabase `leads` table (reference above)")
              if d.get("forwarded"): print("   • Forwarded to LEAD_FORWARD_URL webhook")
          PY
